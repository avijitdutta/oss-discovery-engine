name = "oss-discovery-engine"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Static files (index.html, data.json) are served from ./public.
# The Worker (src/index.js) handles /api/projects; everything else -> assets.
[assets]
directory = "./public"
binding = "ASSETS"

# --- OPTIONAL: caching (add AFTER your first successful deploy) ---
# KV caches the scored payload + last-refresh timestamp so visits don't
# re-hit GitHub. The app works without it (it just refreshes live each load).
# To enable: create the namespace, paste its id, then UNCOMMENT this block:
#   npx wrangler kv namespace create RADAR_KV
#
# [[kv_namespaces]]
# binding = "RADAR_KV"
# id = "PASTE_KV_NAMESPACE_ID_HERE"

# --- OPTIONAL: higher GitHub rate limit ---
# A GitHub token lifts the API limit from 60/hr to 5000/hr. Set as a SECRET:
#   npx wrangler secret put GITHUB_TOKEN
